name = "pdf2zh-worker"
main = "src/index.ts"
compatibility_date = "2024-04-05"

[[d1_databases]]
binding = "DB"
database_name = "pdf2zh-db"
database_id = "your-d1-uuid-here"

[[vpc_services]]
binding = "PC_API_VPC"
service_id = "<PC_API_VPC_SERVICE_ID>"
[vars]
CORS_ORIGIN = "*"
AUTH_MODE = "firebase" # Set to "firebase" in production
FIREBASE_PROJECT_ID = ""
# Secrets (PROXY_SECRET, AGENT_TOKEN, etc.) should be set via:
# wrangler secret put PROXY_SECRET
# Or locally via .dev.vars
